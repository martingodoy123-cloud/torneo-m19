<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Torneo M19 - Ruta Huazihul</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏉 Copa Regional del Oeste 2026 - M19</h1>
        
        <div class="card destacada">
            <h2>Fase 1: Zona Repechaje (30/05)</h2>
            <div id="partidos-repechaje"></div>
        </div>

        <div class="card">
            <h2>Fase 1: Llave Clasificatoria Oro (30/05)</h2>
            <p><small>Cargá los resultados acá para ver qué perdedores bajan a jugar con el repechaje.</small></p>
            <div id="partidos-llave"></div>
        </div>

        <div class="card">
            <h2>Fase 2: Reclasificación Plata/Bronce (13/06)</h2>
            <div id="partidos-reclasificacion"></div>
        </div>

        <div class="listas-copas">
            <div class="card oro-card">
                <h3>Clasificados Copa Plata</h3>
                <ul id="lista-plata"></ul>
            </div>
            <div class="card bronce-card">
                <h3>Clasificados Copa Bronce</h3>
                <ul id="lista-bronce"></ul>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
